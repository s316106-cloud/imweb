<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0nn作品集</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffd6e8;
            --text-main: #9d3b62;
            --accent-1: #ffb6c1;
            --accent-2: #ff69b4;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-hover: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #ffd6e8 0%, #ffe4e1 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 泡泡動畫特效 */
        .bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9), rgba(255, 182, 193, 0.1));
            border-radius: 50%;
            box-shadow: inset 0 0 25px rgba(255, 255, 255, 0.8), 0 10px 20px rgba(255, 105, 180, 0.1);
            animation: float 8s infinite ease-in-out;
            z-index: 0;
            backdrop-filter: blur(2px);
        }

        .bubble:nth-child(1) {
            width: 120px;
            height: 120px;
            left: 10%;
            animation-duration: 8s;
            top: 75%;
        }

        .bubble:nth-child(2) {
            width: 80px;
            height: 80px;
            left: 80%;
            animation-duration: 10s;
            top: 60%;
            animation-delay: 2s;
        }

        .bubble:nth-child(3) {
            width: 150px;
            height: 150px;
            left: 40%;
            animation-duration: 12s;
            top: 85%;
            animation-delay: 4s;
        }

        .bubble:nth-child(4) {
            width: 60px;
            height: 60px;
            left: 25%;
            animation-duration: 7s;
            top: 30%;
            animation-delay: 1s;
        }

        .bubble:nth-child(5) {
            width: 100px;
            height: 100px;
            left: 75%;
            animation-duration: 9s;
            top: 15%;
            animation-delay: 3s;
        }

        .bubble:nth-child(6) {
            width: 180px;
            height: 180px;
            left: 60%;
            animation-duration: 15s;
            top: -5%;
            animation-delay: 0s;
        }

        .bubble:nth-child(7) {
            width: 90px;
            height: 90px;
            left: 5%;
            animation-duration: 11s;
            top: 20%;
            animation-delay: 5s;
        }

        .bubble:nth-child(8) {
            width: 50px;
            height: 50px;
            left: 50%;
            animation-duration: 6s;
            top: 40%;
            animation-delay: 2.5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1) rotate(0deg);
            }

            50% {
                transform: translateY(-40px) scale(1.05) rotate(5deg);
            }
        }

        header {
            margin-top: 5rem;
            text-align: center;
            animation: bounceIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: #d13076;
            text-shadow: 0 4px 10px rgba(255, 105, 180, 0.3), 0 0 20px rgba(255, 255, 255, 0.8);
            letter-spacing: 0.02em;
        }

        p {
            font-size: 1.25rem;
            color: #b75c82;
            margin-bottom: 4rem;
            font-weight: 700;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            padding: 0 2rem 4rem 2rem;
            box-sizing: border-box;
            z-index: 1;
        }

        .card {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4), inset 0 5px 15px rgba(255, 255, 255, 1);
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.03);
            background: var(--card-hover);
            box-shadow: 0 25px 45px rgba(255, 105, 180, 0.4), inset 0 5px 25px rgba(255, 255, 255, 1);
            border-color: #ffffff;
        }

        .card-number {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #ff69b4;
            font-weight: 800;
            margin-bottom: 0.5rem;
            display: inline-block;
            background: rgba(255, 105, 180, 0.15);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 105, 180, 0.3);
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 1rem 0 1rem 0;
            color: #d13076;
        }

        .card-desc {
            color: #a44870;
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0;
            font-weight: 600;
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(-30px);
            }

            50% {
                opacity: 1;
                transform: scale(1.05) translateY(5px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .container {
                grid-template-columns: 1fr;
            }

            .card {
                border-radius: 30px;
            }
        }
    </style>
</head>

<body>
    <!-- 漂浮泡泡背景 -->
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <header>
        <h1>0nn作品集</h1>
        <p>探索互動式網頁設計專案 ✨</p>
    </header>

    <div class="container">
        <a href="lab1/index.html" class="card">
            <span class="card-number">Lab 01</span>
            <h2 class="card-title">猜歌遊戲 🎵</h2>
            <p class="card-desc">測試你的音樂知識。這是一個互動式的猜歌遊戲，聽音樂片段並選出正確的歌曲名稱。</p>
        </a>

        <a href="lab2/index.html" class="card">
            <span class="card-number">Lab 02</span>
            <h2 class="card-title">照相亭 📸</h2>
            <p class="card-desc">利用瀏覽器攝影機來拍攝照片，並套用多種有趣的濾鏡效果。</p>
        </a>

        <a href="lab3/index.html" class="card">
            <span class="card-number">Lab 03</span>
            <h2 class="card-title">自己發想 💡</h2>
            <p class="card-desc">專屬的客製化專案發想空間，實現獨特的創意與技術結合。</p>
        </a>
    </div>
</body>

</html>
